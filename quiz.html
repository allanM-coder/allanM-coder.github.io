<style>
:root{
  --bg:#0a0a10; --bg-soft:#101019; --surface:#14141f;
  --line:rgba(129,140,248,.14); --line-soft:rgba(255,255,255,.07);
  --text:#e7e7ef; --text-dim:#9b9bb0;
  --accent:#818cf8; --accent-strong:#6366f1; --accent-soft:rgba(99,102,241,.12);
  --radius:16px; --font:'Outfit',system-ui,-apple-system,sans-serif; --mono:'JetBrains Mono',ui-monospace,monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:17px;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden;min-height:100dvh}
::selection{background:var(--accent-strong);color:#fff}
a{color:var(--accent);text-decoration:none}
strong{color:var(--text);font-weight:600}
.glow{position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:radial-gradient(600px 400px at 75% -5%,rgba(99,102,241,.22),transparent 60%),
  radial-gradient(900px 600px at -10% 40%,rgba(99,102,241,.08),transparent 60%),
  radial-gradient(700px 500px at 110% 85%,rgba(129,140,248,.10),transparent 60%)}
.shell{max-width:640px;margin:0 auto;padding:28px 22px 80px;min-height:100dvh;display:flex;flex-direction:column}
.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.brand{font-weight:800;letter-spacing:.06em;font-size:14px}
.brand em{font-style:normal;color:var(--accent)}
.mono{font-family:var(--mono);font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent)}
.bar{height:4px;background:rgba(255,255,255,.06);border-radius:999px;overflow:hidden;margin:18px 0 34px}
.bar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,#6366f1,#a5b4fc);border-radius:999px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.card{flex:1;display:flex;flex-direction:column;justify-content:center}
.reveal{animation:fade .5s ease both}
@keyframes fade{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
h1{font-size:clamp(1.9rem,6vw,2.7rem);line-height:1.06;letter-spacing:-.02em;font-weight:800;margin-bottom:18px}
h1 .grad{background:linear-gradient(100deg,#a5b4fc,#6366f1 55%,#a5b4fc);-webkit-background-clip:text;background-clip:text;color:transparent}
.lead{color:var(--text-dim);font-size:1.1rem;margin-bottom:16px;max-width:46ch}
.meta{font-family:var(--mono);font-size:12px;color:var(--text-dim);margin-bottom:32px;letter-spacing:.04em}
.qnum{font-family:var(--mono);font-size:12px;letter-spacing:.14em;color:var(--accent);margin-bottom:14px}
.qtext{font-size:clamp(1.35rem,4.5vw,1.7rem);font-weight:700;line-height:1.25;letter-spacing:-.01em;margin-bottom:28px}
.opts{display:flex;flex-direction:column;gap:12px}
.opt{text-align:left;width:100%;cursor:pointer;color:var(--text);background:var(--surface);border:1px solid var(--line-soft);border-radius:14px;padding:17px 20px;font-family:var(--font);font-size:16.5px;line-height:1.4;display:flex;align-items:center;gap:14px;transition:border-color .18s ease,background .18s ease,transform .12s ease}
.opt:hover{border-color:var(--accent);background:#181826}
.opt:active{transform:scale(.99)}
.opt .dot{flex:none;width:22px;height:22px;border-radius:50%;border:2px solid var(--line);transition:.18s}
.opt:hover .dot{border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}
.opt.sel{border-color:var(--accent-strong);background:#191930}
.opt.sel .dot{border-color:var(--accent-strong);background:var(--accent-strong);box-shadow:0 0 0 4px var(--accent-soft)}
.btn{display:inline-block;font-weight:700;font-size:16px;padding:15px 30px;border-radius:999px;color:#fff;cursor:pointer;border:none;font-family:var(--font);background:linear-gradient(135deg,#6366f1,#4f46e5);box-shadow:0 0 0 1px rgba(129,140,248,.4),0 8px 30px rgba(99,102,241,.45);transition:transform .2s ease,box-shadow .2s ease}
.btn:hover{transform:translateY(-2px);box-shadow:0 0 0 1px rgba(129,140,248,.55),0 12px 40px rgba(99,102,241,.6)}
.btn:active{transform:scale(.98)}
.btn.full{width:100%;text-align:center}
.back{margin-top:22px;font-family:var(--mono);font-size:12px;letter-spacing:.1em;color:var(--text-dim);cursor:pointer;background:none;border:none;text-transform:uppercase}
.back:hover{color:var(--text)}
.badge{display:inline-block;font-family:var(--mono);font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);border:1px solid var(--line);border-radius:999px;padding:7px 15px;margin-bottom:16px}
.rtitle{font-size:clamp(2rem,6.5vw,2.9rem);font-weight:800;letter-spacing:-.02em;line-height:1.05;margin-bottom:8px}
.rtitle .grad{background:linear-gradient(100deg,#a5b4fc,#6366f1 55%,#a5b4fc);-webkit-background-clip:text;background-clip:text;color:transparent}
.rsub{color:var(--text-dim);font-family:var(--mono);font-size:12px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:24px}
/* scores */
.scores{display:flex;flex-direction:column;gap:16px;margin:24px 0 6px}
.score .srow{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
.score .slabel{font-size:.98rem;font-weight:500}
.score .sval{font-family:var(--mono);font-size:1rem;color:var(--accent);font-weight:500}
.score .strack{height:9px;background:rgba(255,255,255,.06);border-radius:999px;overflow:hidden}
.score .sfill{height:100%;border-radius:999px;width:0;transition:width 1s cubic-bezier(.4,0,.2,1)}
.sfill.indigo{background:linear-gradient(90deg,#6366f1,#a5b4fc)}
.sfill.warm{background:linear-gradient(90deg,#f59e0b,#f43f5e)}
.rbody{color:var(--text-dim);font-size:1.06rem;margin:22px 0 4px}
.rbody strong{color:var(--text)}
.punch{border-left:2px solid var(--accent-strong);padding:2px 0 2px 18px;margin:22px 0;font-size:1.1rem;color:var(--text);font-weight:500}
.plan{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:22px 24px;margin-top:26px}
.plan h3{font-size:1.08rem;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.plan ol{list-style:none;counter-reset:p;display:flex;flex-direction:column;gap:12px}
.plan li{counter-increment:p;position:relative;padding-left:38px;font-size:1rem;color:var(--text)}
.plan li::before{content:counter(p);position:absolute;left:0;top:-1px;width:26px;height:26px;border-radius:50%;background:var(--accent-soft);border:1px solid var(--line);color:var(--accent);font-family:var(--mono);font-size:13px;display:flex;align-items:center;justify-content:center;font-weight:600}
.capture{margin-top:26px;background:linear-gradient(180deg,#171728,#111119);border:1px solid var(--line);border-radius:var(--radius);padding:26px 24px}
.capture h3{font-size:1.2rem;font-weight:700;margin-bottom:8px}
.capture p{color:var(--text-dim);font-size:.98rem;margin-bottom:18px}
.frow{display:flex;gap:10px}
.capture input{width:100%;background:var(--bg-soft);border:1px solid var(--line);border-radius:12px;padding:14px 16px;color:var(--text);font-family:var(--font);font-size:16px;margin-bottom:10px}
.capture input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}
.frow input{margin-bottom:0}
.fine{font-family:var(--mono);font-size:11px;color:var(--text-dim);margin-top:12px;letter-spacing:.03em}
.ok{text-align:center;padding:10px 0}
.ok .check{width:56px;height:56px;border-radius:50%;margin:0 auto 18px;background:var(--accent-soft);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:26px}
.foot{margin-top:40px;text-align:center;font-family:var(--mono);font-size:11px;letter-spacing:.08em;color:var(--text-dim)}
@media(max-width:520px){.shell{padding:22px 18px 60px}.opt{padding:15px 17px;font-size:15.5px}.frow{flex-direction:column;gap:0}}
</style>
</head>

  <div class="card" id="card"></div>

<script>
/* ============ CONFIG CAPTURE ============
   Le POST direct vers Brevo (sibforms) ne marche pas depuis un quiz custom
   (Brevo exige son propre JS). La capture passe par FormSubmit -> Gmail ->
   script serveur -> liste Brevo. Clé API Brevo côté serveur, jamais exposée. */
const LEAD_ENDPOINT = "https://formsubmit.co/ajax/allanmaisak@gmail.com";
const BOOK_URL = "https://cal.com/allan-figfsv/appel-confiance-offert";

/* ============ QUESTIONS ============
   Axes : V=besoin de validation · J=peur du jugement · A=masque/inauthenticité
          D=discipline/passivité · R=rapport à la rupture/au manque */
const Q = [
  { q:"Une meuf te plaît dans la rue. Le premier truc qui te traverse :",
    o:[["« Elle va me prendre pour qui ? »",{J:2}],["« J'ai pas le temps, pas là, pas maintenant. »",{D:2}],["« Faut LE truc parfait à dire. »",{A:2}],["J'y vais, on verra bien.",{}]]},
  { q:"Tu postes une story ou une photo. Franchement :",
    o:[["Je check les vues toutes les 5 minutes.",{V:2}],["Je regarde une fois… et ouais, ça me fait un truc.",{V:1}],["J'ai coupé les réseaux, exprès.",{}],["Je m'en fous complètement.",{}]]},
  { q:"Une meuf te plaît VRAIMENT. Ton réflexe, c'est quoi :",
    o:[["Je deviens bizarre, je me contrôle trop.",{A:2}],["J'en fais des caisses pour lui plaire.",{V:2}],["Je me dégonfle.",{J:2}],["Je reste moi, tranquille.",{}]]},
  { q:"Tu te fais rejeter. Le soir, dans ta tête :",
    o:[["« Qu'est-ce qui cloche chez moi ? »",{V:2}],["Je rumine pendant des heures.",{V:1,R:1}],["« Tant pis, next. » Et je le pense vraiment.",{}],["Sur le moment ça va… mais ça revient la nuit.",{R:2}]]},
  { q:"Ta vie sociale, en ce moment :",
    o:[["Je brille avec mes potes, je m'éteins avec des inconnus.",{J:2}],["Trou noir en société.",{J:2,A:1}],["À l'aise à peu près partout.",{}],["Je m'isole pas mal en ce moment.",{R:1,D:1}]]},
  { q:"Être 100 % toi devant une meuf, c'est :",
    o:[["Risqué. Je montre une version « acceptable ».",{A:2}],["En vrai, je sais plus trop qui je suis.",{A:2,V:1}],["Naturel, mais j'ose pas toujours.",{J:1}],["Facile.",{}]]},
  { q:"La discipline dans ta vie, le sport mis à part :",
    o:[["Absente. Je tiens rien.",{D:2}],["Par à-coups. Ça tient jamais.",{D:2}],["Solide sur un ou deux trucs.",{D:1}],["Carrée.",{}]]},
  { q:"Ta dernière rupture, ou juste être seul… tu le vis comment ?",
    o:[["Une vraie claque. Ça m'a réveillé.",{R:2}],["J'évite d'y penser.",{R:2}],["Digéré. J'en ai tiré des leçons.",{}],["Je cherche à combler vite, avec n'importe qui.",{R:1,V:2}]]},
  { q:"Au fond, là, ce que tu veux VRAIMENT :",
    o:[["Qu'on me valide. Qu'on me choisisse, enfin.",{V:2}],["Arrêter d'avoir peur du regard des autres.",{J:2}],["Une relation vraie. Pas des plans.",{R:1}],["Me sentir bien seul, d'abord.",{}]]},
];

/* ============ PROFILS ============ */
const PROFILES = {
  V:{ name:"L'Affamé", tag:"Ton titre de séducteur",
    title:["Tu cours après ","la validation","."],
    body:"Tu vas chercher dehors une valeur que tu t'accordes pas tout seul. Le regard des meufs, les vues, les likes. Moi j'ai tourné là-dedans des années, du coup je te parle pas d'en haut. Le truc… ça se sent. Une meuf capte en 3 secondes le mec qui a besoin d'elle pour exister. Et ça fait fuir pile ce que tu veux.",
    punch:"Le jour où t'arrêtes de courir après… c'est là qu'elles commencent à courir après toi. C'est pas une punchline, c'est mécanique.",
    plan:["Cette semaine, coupe UNE source de validation. Désactive les vues de tes stories, ou lâche un réseau. Une seule, mais tu le fais.","Chaque soir, note 1 truc dont t'es fier. Sans le dire à personne. Tu réapprends à te valider tout seul.","Aborde une meuf sans aucun objectif de résultat. Le résultat, c'est que t'as osé. Rien d'autre."] },
  A:{ name:"Le Masqué", tag:"Ton titre de séducteur",
    title:["Tu joues un rôle, ","tu t'effaces","."],
    body:"T'as tellement peur de pas plaire que tu montres une version lissée, « correcte » de toi. Sauf qu'une meuf, elle tombe pas amoureuse d'un rôle. Elle tombe amoureuse d'un mec entier, avec ses angles, ses trucs bizarres. Et toi, à force de te cacher, tu la prives de la seule chose qui pouvait l'attirer… bah, toi.",
    punch:"T'as pas besoin de devenir quelqu'un d'autre. T'as juste besoin d'oser être toi… à voix haute.",
    plan:["À ta prochaine interaction, dis UN truc vrai qui te fait un peu flipper. Un avis tranché, un délire de geek, un désaccord. Un seul.","Arrête d'acquiescer à tout ce qu'elle dit. Quand t'es pas d'accord, assume, tranquille.","Repère la version de toi que tu planques le plus… et montre-la exprès une fois cette semaine."] },
  J:{ name:"Le Retenu", tag:"Ton titre de séducteur",
    title:["Tu sais qui tu es. ","La peur te fige","."],
    body:"Ton souci c'est pas ton game, c'est ce regard imaginaire des autres qui te bloque pile au moment d'y aller. Aborder devant un groupe, parler fort, assumer… ton corps dit non avant même que t'aies essayé. Du coup tu regardes passer des meufs que t'aurais carrément pu avoir.",
    punch:"La liberté sociale ça se muscle. Comme à la salle : surcharge progressive, une interaction à la fois.",
    plan:["Cette semaine, fais 3 micro-actions un peu gênantes. Demander l'heure en parlant fort, tenir un regard, causer à un inconnu.","Aborde dans les 3 secondes. Avant que ta tête ait le temps d'inventer une excuse.","Aborde une fois devant un groupe. Le pire que t'imagines, il arrivera pas. Et même si… t'es toujours vivant."] },
  R:{ name:"Le Renaissant", tag:"Ton titre de séducteur",
    title:["Une claque ","t'a réveillé","."],
    body:"Une rupture, un vide, une humiliation… un truc t'a mis par terre et t'a fait capter que ta vie était pas alignée. Ça fait mal, je sais. Mais franchement c'est le meilleur point de départ qui existe. La plupart des mecs restent endormis toute leur vie. Toi t'as vu. Reste juste à reconstruire sur des bases qui tiennent, cette fois.",
    punch:"Le but c'est pas de re-choper vite pour combler le vide. C'est de devenir le mec qui a plus jamais peur de se retrouver SEUL.",
    plan:["Écris ce que cette claque t'a appris sur toi. Noir sur blanc, vraiment. C'est ta base pour la suite.","Cette semaine, reconstruis UN pilier à toi. Sport, projet, une amitié. Un truc qui dépend d'aucune meuf.","Réapprends à être bien seul un soir. Sors, aborde, parle aux gens… sans chercher à rentrer avec qui que ce soit."] },
  D:{ name:"Le Dispersé", tag:"Ton titre de séducteur",
    title:["Tu sais quoi faire. ","Tu le fais pas","."],
    body:"T'as compris le game. T'as les infos, les conseils, parfois même les résultats quand tu t'y mets vraiment. Ton problème c'est pas le savoir, c'est la constance. Tu démarres à fond, et puis tu lâches. Tu vois le taf comme une montagne, du coup tu le fais pas. Et sans régularité, ton niveau stagne alors que t'as tout le potentiel.",
    punch:"Le talent sans constance, putain ça vaut rien. Ton prochain palier, il est juste de l'autre côté de la régularité.",
    plan:["Choisis UNE action minuscule, tous les jours cette semaine. 2 abordages, 1 analyse. Non négociable, même les jours sans.","Après chaque interaction, note 3 lignes à chaud. Pas un roman. 3 lignes, c'est tout.","Rends des comptes à quelqu'un. Un pote, un coach, peu importe. Ce que t'as promis à voix haute, tu le fais."] },
  aligned:{ name:"L'Ancré", tag:"Ton titre de séducteur",
    title:["T'es plus proche ","que tu crois","."],
    body:"T'as déjà fait le gros du taf. T'es à peu près à l'aise, tu te connais, tu cours pas après grand-chose. Ce qui te manque c'est pas une transformation, franchement non. C'est un dernier cran. Un peu plus de constance, et un œil qui t'ajuste au bon moment.",
    punch:"Le dernier 20 %, c'est celui qui change tout. Et c'est le plus dur à faire seul.",
    plan:["Monte ton standard. Arrête de valider les interactions moyennes, tu vaux mieux que ça.","Bosse la régularité. 3 interactions de qualité par semaine, analysées. Pas 50 à l'arrache.","Trouve un œil extérieur qui te dit la vérité sur ton angle mort. C'est là qu'il est, ton dernier cran."] },
};

/* ============ ÉTAT ============ */
let step = -1;
const answers = [];
const card = document.getElementById('card');
const prog = document.getElementById('progress');
const counter = document.getElementById('counter');
const clamp = (n,a,b)=> Math.max(a, Math.min(b, n));

function setProgress(){
  const pct = step < 0 ? 0 : Math.round((step)/(Q.length)*100);
  prog.style.width = pct + "%";
  counter.textContent = step < 0 ? "" : (step+1) + " / " + Q.length;
}

function intro(){
  step = -1; setProgress();
  card.className = "card reveal";
  card.innerHTML = `
    <div class="mono" style="margin-bottom:18px">Le test · 2 min · 9 questions</div>
    <h1>Tu cours après,<br><span class="grad">ou on court après toi</span> ?</h1>
    <p class="lead">Neuf questions honnêtes, et tu réponds sans te mentir. À la fin t'as ton <strong>titre</strong>, tes <strong>scores</strong> et un <strong>mini-plan</strong> pour débloquer le vrai truc. Parce que le vrai truc… c'est presque jamais ton game.</p>
    <p class="meta">Réponds cash, comme si on était en terrasse tous les deux. Personne te juge.</p>
    <button class="btn" onclick="go(0)">Let's go →</button>`;
}

function render(){
  const item = Q[step];
  setProgress();
  card.className = "card reveal";
  const opts = item.o.map((o,i)=>`
    <button class="opt${answers[step]===i?' sel':''}" onclick="pick(${i})">
      <span class="dot"></span><span>${o[0]}</span>
    </button>`).join("");
  card.innerHTML = `
    <div class="qnum">Question ${step+1}</div>
    <div class="qtext">${item.q}</div>
    <div class="opts">${opts}</div>
    ${step>0?'<button class="back" onclick="go('+(step-1)+')">← Retour</button>':''}`;
}

function pick(i){ answers[step] = i; setTimeout(()=>{ step+1 < Q.length ? go(step+1) : result(); }, 190); }
function go(s){ step = s; render(); }

function score(){
  const t = {V:0,J:0,A:0,D:0,R:0};
  answers.forEach((ai,qi)=>{ const m=Q[qi].o[ai][1]; for(const k in m) t[k]+=m[k]; });
  return t;
}
/* scores "grand public" 0-100 dérivés des axes */
function namedScores(t){
  return {
    validation: clamp(Math.round(t.V/8*100), 4, 98),
    confiance:  clamp(100 - Math.round((t.V+t.J+t.A)/17*100), 4, 98),
    liberte:    clamp(100 - Math.round(t.J/6*100), 4, 98),
  };
}
function profileKey(t){
  const total = t.V+t.J+t.A+t.D+t.R;
  if(total < 5) return "aligned";
  return Object.keys(t).reduce((a,b)=> t[b]>t[a]?b:a, "V");
}

function result(){
  const t = score();
  const total = t.V+t.J+t.A+t.D+t.R;
  const key = PROFILES[profileKey(t)] ? profileKey(t) : "aligned";
  const p = PROFILES[key];
  const s = namedScores(t);
  setProgress(); prog.style.width="100%"; counter.textContent="Résultat";
  card.className="card reveal";
  card.innerHTML = `
    <div class="badge">${p.tag}</div>
    <div class="rtitle">${p.name}</div>
    <div class="rsub">${p.title[0]}${p.title[1]}${p.title[2]}</div>

    <div class="scores">
      ${scoreBar("Dépendance à la validation", s.validation, "warm")}
      ${scoreBar("Confiance en toi", s.confiance, "indigo")}
      ${scoreBar("Liberté sociale", s.liberte, "indigo")}
    </div>

    <p class="rbody">${p.body}</p>
    <div class="punch">${p.punch}</div>

    <div class="plan">
      <h3>🎯 Ton mini-plan pour cette semaine</h3>
      <ol>${p.plan.map(a=>`<li>${a}</li>`).join("")}</ol>
    </div>

    <div class="capture">
      <h3>Ton plan complet, je te l'envoie 👇</h3>
      <p>Je t'envoie ton analyse complète, et les leviers plus avancés pour faire passer <strong>${p.name}</strong> au niveau au-dessus. Direct par mail, rien d'autre.</p>
      <form id="capForm" onsubmit="return submitLead(event,'${key}',${total})">
        <div class="frow">
          <input type="text" id="prenom" placeholder="Prénom" required autocomplete="given-name">
          <input type="text" id="nom" placeholder="Nom" required autocomplete="family-name">
        </div>
        <input type="email" id="email" placeholder="ton@email.com" required autocomplete="email">
        <button class="btn full" type="submit">Envoie-moi mon plan complet</button>
      </form>
      <p class="fine">Zéro spam, promis. Tu te désabonnes en un clic.</p>
    </div>
    <button class="back" style="margin-top:26px" onclick="intro()">↺ Refaire le test</button>`;
  // animer les barres
  requestAnimationFrame(()=>{ setTimeout(()=>{
    document.querySelectorAll('.sfill').forEach(el=> el.style.width = el.dataset.v + "%");
  }, 120); });
}

function scoreBar(label, val, cls){
  return `<div class="score">
    <div class="srow"><span class="slabel">${label}</span><span class="sval">${val}%</span></div>
    <div class="strack"><div class="sfill ${cls}" data-v="${val}"></div></div>
  </div>`;
}

function submitLead(e, key, total){
  e.preventDefault();
  const prenom = document.getElementById('prenom').value.trim();
  const nom = document.getElementById('nom').value.trim();
  const email = document.getElementById('email').value.trim();
  if(!email || email.indexOf('@')<0 || !prenom) return false;
  const t = score(); const s = namedScores(t);
  const profil = PROFILES[key].name;
  const src = "Quiz - tu cours apres";
  try{ localStorage.setItem('quiz_lead', JSON.stringify({prenom,nom,email,profil,total,scores:s})); }catch(_){}

  if(LEAD_ENDPOINT){
    fetch(LEAD_ENDPOINT, {
      method:'POST',
      headers:{'Content-Type':'application/json','Accept':'application/json'},
      body:JSON.stringify({
        _subject:`Nouveau lead quiz : ${prenom} ${nom} (${profil})`,
        prenom, nom, email, profil,
        score_validation:s.validation, score_confiance:s.confiance, score_liberte:s.liberte,
        score_total:total, source:src,
        // ligne machine pour le script serveur -> Brevo (parsing robuste)
        lead_data:`LEADV2|${email}|${prenom}|${nom}|${profil}|${total}|${t.V}|${t.J}|${t.A}|${t.D}|${t.R}|${src}`
      })
    }).catch(()=>{});
  }
  let fired=false;
  const done=()=>{ if(!fired){ fired=true; success(key, prenom); } };
  setTimeout(done, 600);
  return false;
}

function success(key, prenom){
  const p = PROFILES[key];
  card.className="card reveal";
  card.innerHTML = `
    <div class="ok">
      <div class="check">✓</div>
      <div class="rtitle" style="font-size:clamp(1.6rem,5.5vw,2.2rem)">C'est parti${prenom?', '+prenom:''}.</div>
      <p class="rbody" style="max-width:42ch;margin:0 auto 8px">Ton plan complet pour <strong>${p.name}</strong> arrive dans ta boîte mail, là, tout de suite. Check tes spams si tu vois rien d'ici 5 min.</p>
      <div class="punch" style="display:inline-block;text-align:left;margin:24px auto">Envie d'aller plus vite ? Le premier appel avec moi est offert. On regarde ta situation ensemble, tranquille, zéro engagement.</div>
      <div style="margin-top:8px"><a class="btn" href="${BOOK_URL}" target="_blank" rel="noopener">Je réserve mon appel offert →</a></div>
      <div style="margin-top:26px"><a href="/" class="mono" style="letter-spacing:.1em">← Revenir au site</a></div>
    </div>`;
}

intro();
</script>
</body>
</html>
